# ============================================================
# CI/CD Pipeline — TaskFlow API
#
# CI — triggered on every push, pull request and manually
#      via workflow_dispatch (CI only by default)
# CD — triggered on push to main only, or manually with
#      force_deploy enabled
#
# Jobs:
#   ci → gitleaks, checkstyle, compile, test, jacoco, owasp
#   cd → docker build, trivy scan, push ghcr.io, deploy VPS,
#        health check, rollback, smoke tests
#
# Security model:
#   - GITHUB_TOKEN used for all registry operations (no PAT)
#   - Permissions declared at workflow level (least privilege)
#   - Secrets: CODECOV_TOKEN, NVD_API_KEY, VPS_HOST,
#              VPS_USER, VPS_SSH_KEY
#
# Performance:
#   - Gradle dependencies cached across runs
#   - OWASP NVD database cached to avoid 1h+ download
#   - Docker layers cached via GitHub Actions cache (buildx)
#   - JAR built once in CI and reused in CD (no recompilation)
#
# Reliability:
#   - Concurrency control cancels outdated runs on same branch
#   - Timeout limits prevent runaway jobs consuming CI minutes
#   - Automatic rollback to previous image if health check fails
#   - Health check retries for 3 minutes after deploy
# ============================================================

name: CI/CD

on:
  push:
    # CI runs on every branch push to catch regressions early
    branches: [ "**" ]
  pull_request:
    # CI also runs on PRs — CD is skipped for pull_request events
    branches: [ "**" ]
  workflow_dispatch:
    # Manual trigger — allows forcing a CD deployment from any branch
    # Useful for hotfixes or testing the pipeline without a code change
    inputs:
      force_deploy:
        description: 'Force deployment to VPS (CD)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mehdi-rochereau/taskflow-api
  JAVA_VERSION: '21'
  # Production API base URL — used by health check and smoke tests
  API_BASE_URL: https://api.taskflow.mehdi-rochereau.dev

# Workflow-level permissions (least privilege principle).
# contents: read   — checkout source code
# packages: write  — push Docker image to ghcr.io
# checks: write    — publish check results (GitLeaks SARIF)
# actions: read    — download artifacts between jobs
permissions:
  contents: read
  packages: write
  checks: write
  actions: read

# Cancel any in-progress run on the same branch when a new push arrives.
# Prevents stale pipeline runs from consuming CI minutes unnecessarily.
# The group key ensures CI and CD share the same concurrency slot per branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── CI ─────────────────────────────────────────────────────
  # Runs on every push and pull request.
  # Validates code quality, tests, coverage, and security before
  # any artifact is built or deployed.
  ci:
    name: CI
    runs-on: ubuntu-latest
    # Hard limit — prevents a hung Gradle daemon or network issue
    # from consuming the full 6-hour GitHub Actions job limit.
    timeout-minutes: 30

    steps:

      # ── Checkout ─────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches full git history.
          # Required by GitLeaks to scan all commits, not just HEAD.
          # Without this, GitLeaks only sees the latest commit.
          fetch-depth: 0

      # ── Secret scanning ──────────────────────────────────
      # GitLeaks scans the full commit history for accidentally
      # committed secrets (API keys, passwords, tokens).
      # Runs before any build step to fail fast on security issues.
      # A .gitleaks.toml allowlist is used to suppress false positives
      # from Swagger/OpenAPI example token values in annotations.
      - name: Scan for secrets with GitLeaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Java setup ───────────────────────────────────────
      # Eclipse Temurin is the open-source, production-grade JDK
      # distribution maintained by the Adoptium project.
      # Using the same version (21) as specified in build.gradle
      # ensures consistency between local dev and CI environments.
      - name: Set up Java ${{ env.JAVA_VERSION }}
        id: java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # ── Gradle cache ─────────────────────────────────────
      # Caches downloaded Gradle dependencies between runs.
      # The cache key includes a hash of all Gradle files —
      # if dependencies change, the cache is invalidated automatically.
      # restore-keys provides a fallback to the most recent cache
      # if no exact match is found (partial cache hit).
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Caches the OWASP NVD (National Vulnerability Database) locally.
      # Without caching, the NVD download takes 60-90 minutes per run.
      # With caching and an NVD API key, updates take ~20 seconds.
      # Cache key is based on build.gradle — invalidated when
      # dependencies change and a fresh CVE check is needed.
      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('build.gradle') }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      # ── Checkstyle ───────────────────────────────────────
      # Enforces Java code style conventions defined in
      # config/checkstyle/checkstyle.xml (Google Style variant).
      # continue-on-error: true — violations are warnings, not blockers.
      # The goal is progressive improvement, not a hard gate.
      # Set to false once all violations are resolved.
      - name: Run Checkstyle
        id: checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon
        continue-on-error: true

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/
          retention-days: 7

      # ── Compile ──────────────────────────────────────────
      # Compiles main and test sources separately.
      # A compile failure here means no test run — fast feedback.
      - name: Compile
        id: compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      # ── Tests + JaCoCo ───────────────────────────────────
      # Runs the full JUnit 5 test suite with Mockito.
      # SPRING_PROFILES_ACTIVE=test activates the test profile,
      # which uses H2 in-memory database instead of MySQL,
      # keeping tests fast and self-contained.
      # jacocoTestReport is chained via finalizedBy in build.gradle,
      # but called explicitly here for clarity.
      - name: Run tests and generate JaCoCo report
        id: tests
        run: ./gradlew test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/html/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test/
          retention-days: 7

      # ── Coverage threshold ───────────────────────────────
      # Parses the JaCoCo XML report and extracts INSTRUCTION coverage.
      # INSTRUCTION coverage is used (not LINE or BRANCH) because it is
      # the most granular metric and best reflects actual code execution.
      # Threshold: 80% — blocks the pipeline if coverage drops below.
      # DTOs, config classes, exceptions, and Application.java are
      # excluded from coverage measurement (see build.gradle exclusions).
      - name: Check coverage threshold (80%)
        id: coverage
        run: |
          REPORT_PATH=$(find build/reports/jacoco -name "*.xml" | head -1)
          echo "Found report at: $REPORT_PATH"
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$REPORT_PATH')
          root = tree.getroot()
          for counter in root.findall('counter'):
              if counter.get('type') == 'INSTRUCTION':
                  missed = int(counter.get('missed'))
                  covered = int(counter.get('covered'))
                  total = missed + covered
                  pct = (covered / total) * 100 if total > 0 else 0
                  print(f'{pct:.2f}')
                  break
          ")
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the 80% threshold"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets the 80% threshold"
          fi

      # ── Codecov ──────────────────────────────────────────
      # Uploads the JaCoCo XML report to Codecov for trend tracking
      # and PR coverage diff comments.
      # fail_ci_if_error: false — Codecov outages don't block the pipeline.
      - name: Upload coverage to Codecov
        id: codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false
          verbose: true

      # ── OWASP Dependency Check ───────────────────────────
      # Scans all project dependencies against the NVD CVE database.
      # Fails the build only if a dependency has a CVSS score >= 9
      # (Critical severity) — see failBuildOnCVSS in build.gradle.
      # continue-on-error: true — HIGH vulnerabilities are reported
      # but do not block the pipeline (informational).
      # Sonatype OSS Index is disabled — NVD provides equivalent coverage.
      # NVD_API_KEY speeds up database updates from 90min to ~20sec.
      - name: Run OWASP Dependency Check
        id: owasp
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: build/reports/dependency-check-report.html
          retention-days: 7

      # ── Build JAR ────────────────────────────────────────
      # Builds the executable Spring Boot fat JAR.
      # -x test skips tests — already run in the previous step.
      # The JAR is uploaded as an artifact and reused by the CD job,
      # avoiding a second Gradle compilation in the Docker build phase.
      - name: Build JAR
        id: jar
        run: ./gradlew bootJar --no-daemon -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-api-jar
          path: build/libs/*.jar
          # 7 days — long enough for manual CD trigger after CI completes
          retention-days: 7

      # ── GitHub Actions Step Summary ──────────────────────
      # Generates a markdown summary table visible in the Actions UI.
      # Uses ternary expressions on step outcomes for status icons.
      - name: Generate CI summary
        if: always()
        run: |
          echo "## 🚀 TaskFlow API — CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 GitLeaks | ${{ steps.gitleaks.outcome == 'success' && '✅ No secrets detected' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ☕ Java | ${{ env.JAVA_VERSION }} (Temurin) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Checkstyle | ${{ steps.checkstyle.outcome == 'success' && '✅ Passed' || '⚠️ Warnings' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Compile | ${{ steps.compile.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ steps.tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Coverage | ${{ steps.coverage.outcome == 'success' && '✅' || '❌' }} ${{ steps.coverage.outputs.coverage }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 OWASP | ${{ steps.owasp.outcome == 'success' && '✅ No issues' || '⚠️ Check report' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 JAR | ${{ steps.jar.outcome == 'success' && '✅ Built' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

  # ── CD ─────────────────────────────────────────────────────
  # Runs only on push to main or manual workflow_dispatch with
  # force_deploy enabled. Never runs on pull requests.
  # Depends on CI passing (needs: ci).
  #
  # Flow: download JAR → build Docker image → Trivy scan →
  #       push to ghcr.io → deploy VPS → health check →
  #       rollback if needed → smoke tests
  cd:
    name: CD
    runs-on: ubuntu-latest
    needs: ci
    # Hard limit — prevents a stuck SSH session or Docker push
    # from consuming the full job timeout.
    timeout-minutes: 20
    if: |
      github.event_name != 'pull_request' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true')
      )

    steps:

      # ── Checkout ─────────────────────────────────────────
      # Required for Docker build context (Dockerfile.cd, .dockerignore).
      # Source code itself is not recompiled here — the JAR from CI is used.
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Download JAR from CI ──────────────────────────────
      # Downloads the JAR artifact built by the CI job.
      # This avoids recompiling the application in the CD job,
      # ensuring the exact same binary that passed all CI checks
      # is the one packaged into the Docker image.
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: taskflow-api-jar
          path: build/libs/

      # ── Prepare JAR for Docker ────────────────────────────
      # Copies the JAR to the root directory as app.jar.
      # Docker buildx sends the build context to the builder daemon,
      # which resolves paths relative to the context root.
      # Placing the JAR at the root ensures Dockerfile.cd can COPY it
      # regardless of the buildx driver's context handling.
      - name: Prepare JAR for Docker build
        run: cp build/libs/taskflow-api-*.jar app.jar

      # ── Setup Buildx ─────────────────────────────────────
      # Initializes Docker buildx with the docker-container driver.
      # Required to enable GitHub Actions cache (type=gha) for
      # Docker layer caching. The default docker driver does not
      # support external cache backends.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker login ─────────────────────────────────────
      # Authenticates to GitHub Container Registry using GITHUB_TOKEN.
      # No PAT (Personal Access Token) required — GITHUB_TOKEN has
      # packages: write permission declared at the workflow level.
      # The package must have the repository added in "Manage Actions access"
      # under the package settings on GitHub.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker metadata ──────────────────────────────────
      # Generates OCI-compliant image tags and labels automatically:
      # - sha-<short-commit>: immutable tag for traceability
      # - latest: mutable tag for docker compose pull on the VPS
      # Labels include source repo, commit SHA, build date — visible
      # in the GitHub Packages UI and useful for incident investigation.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── Docker build & push ──────────────────────────────
      # Builds the runtime Docker image using Dockerfile.cd.
      # Dockerfile.cd is a minimal runtime-only image — it does NOT
      # run Gradle or compile Java. It simply copies the pre-built JAR.
      # This makes the CD build ~3-5 minutes faster than a full build.
      #
      # cache-from/cache-to: reuses Docker layer cache from previous runs
      # via GitHub Actions cache storage. Layers that haven't changed
      # (base image, user creation) are not re-downloaded or re-executed.
      #
      # provenance: false disables SLSA provenance attestation.
      # Enabled by default in buildx but causes digest resolution issues
      # with private registries in some Trivy scan configurations.
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cd
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── Trivy scan ───────────────────────────────────────
      # Scans the pushed Docker image for OS and library vulnerabilities.
      # Scans the image by digest (immutable) rather than tag (mutable)
      # to ensure the exact pushed image is scanned, not a cached version.
      # ignore-unfixed: true skips CVEs with no available fix —
      # reporting them would be noise with no actionable remediation.
      # severity: CRITICAL,HIGH — LOW and MEDIUM are excluded.
      # continue-on-error: true — scan is informational for now.
      # Exit code 1 would block deployment; kept for future enforcement.
      - name: Scan Docker image with Trivy
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'
          output: trivy-report.txt
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 7

      # ── Deploy VPS ───────────────────────────────────────
      # Connects to the production VPS via SSH and deploys the new image.
      # Before pulling the new image, the current container's image
      # reference is saved to /tmp/taskflow_rollback.env.
      # This allows the rollback step to restore the previous version
      # if the health check fails after deployment.
      #
      # VPS setup: Ubuntu 24.04 on Hetzner CPX22, Docker + Nginx + SSL.
      # SSH key: dedicated Ed25519 key generated for GitHub Actions only,
      # stored as VPS_SSH_KEY secret, added to authorized_keys on VPS.
      - name: Deploy to VPS
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/taskflow
            PREVIOUS_IMAGE=$(docker inspect taskflow-api --format='{{.Config.Image}}' 2>/dev/null || echo "")
            echo "previous_image=$PREVIOUS_IMAGE" > /tmp/taskflow_rollback.env
            docker compose pull taskflow-api
            docker compose up -d taskflow-api
            echo "✅ taskflow-api deployed"

      # ── Health check ─────────────────────────────────────
      # Polls /actuator/health every 10 seconds for up to 3 minutes (18 attempts).
      # Spring Boot Actuator exposes this endpoint — it returns HTTP 200
      # when the application context is fully loaded and all health
      # indicators (DB connection, disk space) report UP.
      # 3 minutes accounts for JVM cold start + Flyway migration time.
      - name: Health check
        id: health
        run: |
          echo "Waiting for API to start..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_BASE_URL }}/actuator/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is healthy (HTTP $STATUS) after attempt $i"
              exit 0
            fi
            echo "Attempt $i/18 — HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Timeout after 3 minutes — API did not respond"
          exit 1

      # ── Rollback on failure ──────────────────────────────
      # Triggered only if the health check step failed (not skipped).
      # Reads the previous image reference saved before deployment
      # and restores it by re-tagging and restarting the container.
      # This ensures the production API is never left in a broken state
      # after a failed deployment.
      - name: Rollback on health check failure
        if: failure() && steps.health.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/taskflow
            source /tmp/taskflow_rollback.env
            if [ -n "$PREVIOUS_IMAGE" ]; then
              echo "⚠️ Rolling back to $PREVIOUS_IMAGE"
              docker compose stop taskflow-api
              docker tag $PREVIOUS_IMAGE ghcr.io/mehdi-rochereau/taskflow-api:latest
              docker compose up -d taskflow-api
              echo "✅ Rollback complete"
            else
              echo "❌ No previous image found, cannot rollback"
            fi

      # ── Smoke tests ──────────────────────────────────────
      # Verifies that key public endpoints respond correctly after deploy.
      # Tests three endpoints:
      # - /swagger-ui/index.html : Springdoc OpenAPI UI (follows redirect with -L)
      # - /v3/api-docs           : OpenAPI JSON spec
      # - /actuator/health       : Spring Boot health endpoint
      # All three must return HTTP 200 for the smoke test to pass.
      # This confirms Nginx, SSL termination, and the app are all working.
      - name: Smoke test public endpoints
        id: smoke
        run: |
          echo "Testing public endpoints..."

          SWAGGER=$(curl -s -L -o /dev/null -w "%{http_code}" ${{ env.API_BASE_URL }}/swagger-ui/index.html)
          echo "Swagger UI: HTTP $SWAGGER"

          DOCS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_BASE_URL }}/v3/api-docs)
          echo "API Docs: HTTP $DOCS"

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_BASE_URL }}/actuator/health)
          echo "Health: HTTP $HEALTH"

          if [ "$SWAGGER" = "200" ] && [ "$DOCS" = "200" ] && [ "$HEALTH" = "200" ]; then
            echo "✅ All smoke tests passed"
          else
            echo "❌ Smoke tests failed"
            exit 1
          fi

      # ── CD Summary ───────────────────────────────────────
      # Generates a deployment summary visible in the Actions UI.
      # Includes image digest for traceability — links a deployment
      # to the exact immutable image that was pushed and deployed.
      - name: Generate CD summary
        if: always()
        run: |
          echo "## 🚢 TaskFlow API — CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build & Push | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Trivy Scan | ${{ steps.trivy.outcome == 'success' && '✅ No critical vulnerabilities' || '❌ Critical CVE detected' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy to VPS | ${{ steps.deploy.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❤️ Health Check | ${{ steps.health.outcome == 'success' && '✅ API is UP' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Smoke Tests | ${{ steps.smoke.outcome == 'success' && '✅ All passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY