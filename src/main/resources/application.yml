spring:
  application:
    name: taskflow-api

  messages:
    basename: messages
    encoding: UTF-8
    default-locale: en
    fallback-to-system-locale: false

  datasource:
    url: jdbc:mysql://localhost:3306/taskflow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082
  error:
    whitelabel:
      enabled: false

application:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long}
    expiration: ${JWT_EXPIRATION:900000}
  cookie:
    secure: ${COOKIE_SECURE:false}
  refresh-token:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never