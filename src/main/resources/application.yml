spring:
  application:
    name: taskflow-api
  messages:
    basename: messages
    encoding: UTF-8
    default-locale: en
    fallback-to-system-locale: false

  datasource:
    url: jdbc:mysql://localhost:3306/taskflow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082

application:
  jwt:
    secret: ${JWT_SECRET:ce-secret-doit-faire-au-moins-256-bits-soit-32-caracteres-minimum}
    expiration: 86400000